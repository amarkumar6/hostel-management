spring.application.name=hostel-management

spring.h2.console.enabled=false

# =========================
# MYSQL CONFIG (RAILWAY)
# =========================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# =========================
# SERVER PORT
# =========================
server.port=${PORT:8080}

# =========================
# JWT CONFIG
# =========================
jwt.secret=9a6747553b0f16ad03a29447d9a1310c9a6747553b0f16ad03a29447d9a1310c
jwt.expiration=86400000

# =========================
# FILE UPLOAD
# =========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

upload.dir=uploads/
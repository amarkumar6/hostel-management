<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Management | Login</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <div class="bg-primary text-white d-inline-block p-3 rounded-circle mb-3">
                                <i class="fas fa-hotel fa-2x"></i>
                            </div>
                            <h2 class="fw-bold">Welcome Back</h2>
                            <p class="text-muted">Login to manage your hostel</p>
                        </div>

                        <!-- Login Tabs -->
                        <ul class="nav nav-pills nav-fill mb-4 bg-light p-1 rounded-pill" id="loginTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active rounded-pill fw-bold" id="student-tab" data-bs-toggle="pill" data-bs-target="#student-login" type="button" role="tab">
                                    <i class="fas fa-user-graduate me-2"></i>Student
                                </button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link rounded-pill fw-bold" id="admin-tab" data-bs-toggle="pill" data-bs-target="#admin-login" type="button" role="tab">
                                    <i class="fas fa-user-shield me-2"></i>Admin
                                </button>
                            </li>
                        </ul>

                        <div class="tab-content" id="loginTabsContent">
                            <!-- Student Login Pane -->
                            <div class="tab-pane fade show active" id="student-login" role="tabpanel">
                                <form id="studentLoginForm">
                                    <input type="hidden" name="loginRole" value="student">
                                    <div class="mb-3">
                                        <label for="studentEmail" class="form-label">Student Email</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                                            <input type="email" class="form-control bg-light border-start-0" id="studentEmail" placeholder="student@example.com" required>
                                        </div>
                                    </div>
                                    <div class="mb-4">
                                        <label for="studentPassword" class="form-label">Password</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                                            <input type="password" class="form-control bg-light border-start-0" id="studentPassword" placeholder="••••••••" required>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100 py-3 rounded-3 fw-bold mb-3">
                                        Student Sign In <i class="fas fa-arrow-right ms-2"></i>
                                    </button>
                                    <div class="text-center mb-3">
                                        <p class="mb-0 text-muted">Don't have an account? <a href="register.html" class="text-primary text-decoration-none fw-bold">Register</a></p>
                                    </div>
                                    <div class="alert alert-info mt-2 small border-0 rounded-3">
                                        <strong>New students:</strong> Register and log in to access your student dashboard and view your room details.
                                    </div>
                                </form>
                            </div>

                            <!-- Admin Login Pane -->
                            <div class="tab-pane fade" id="admin-login" role="tabpanel">
                                <form id="adminLoginForm">
                                    <input type="hidden" name="loginRole" value="admin">
                                    <div class="mb-3">
                                        <label for="adminEmail" class="form-label">Admin Email</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-user-shield text-muted"></i></span>
                                            <input type="email" class="form-control bg-light border-start-0" id="adminEmail" placeholder="admin@example.com" required>
                                        </div>
                                    </div>
                                    <div class="mb-4">
                                        <label for="adminPassword" class="form-label">Password</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                                            <input type="password" class="form-control bg-light border-start-0" id="adminPassword" placeholder="••••••••" required>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-dark w-100 py-3 rounded-3 fw-bold mb-3">
                                        Admin Sign In <i class="fas fa-shield-alt ms-2"></i>
                                    </button>
                                </form>
                            </div>
                        </div>

                        <div id="connectionStatus" class="text-center mt-3 small">
                            <span class="badge bg-secondary rounded-pill px-3"><i class="fas fa-spinner fa-spin me-1"></i> Checking connection...</span>
                        </div>
                    </div>
                </div>
                <div class="text-center mt-4 text-muted small">
                    &copy; 2026 Hostel Management System. All rights reserved.
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/app.js?v=5"></script>
</body>
</html>
